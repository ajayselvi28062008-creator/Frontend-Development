<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anime Streaming UI</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:linear-gradient(to right, midnightblue, darkviolet);
            color:white;
        }

        nav{
            background:linear-gradient(to right, black, purple);
            padding:15px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            font-size:28px;
            font-weight:bold;
            color:cyan;
        }

        nav ul{
            display:flex;
            list-style:none;
            gap:25px;
        }

        nav ul li{
            cursor:pointer;
            transition:0.3s;
        }

        nav ul li:hover{
            color:cyan;
        }

        .hero{
            display:flex;
            justify-content:center;
            align-items:center;
            text-align:center;
            padding:60px 20px;
        }

        .hero-content h1{
            font-size:55px;
            margin-bottom:20px;
        }

        .hero-content p{
            font-size:20px;
            margin-bottom:25px;
        }

        .hero-content button{
            padding:12px 25px;
            border:none;
            border-radius:8px;
            background:cyan;
            color:black;
            font-size:17px;
            cursor:pointer;
            transition:0.3s;
        }

        .hero-content button:hover{
            transform:scale(1.1);
        }

        .container{
            width:90%;
            margin:auto;
            padding-bottom:40px;
        }

        .container h2{
            margin-bottom:20px;
        }

        .cards{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:20px;
        }

        .card{
            background:#1b1b1b;
            border-radius:15px;
            overflow:hidden;
            transition:0.3s;
            box-shadow:0 0 10px black;
            width:350px;
        }

        .card:hover{
            transform:translateY(-10px);
        }

        .card img{
            width:100%;
            height:240px;
            object-fit:cover;
        }

        .card-content{
            padding:15px;
        }

        .card-content h3{
            margin-bottom:10px;
        }

        .card-content button{
            margin-top:10px;
            padding:10px 18px;
            border:none;
            border-radius:5px;
            background:darkviolet;
            color:white;
            cursor:pointer;
        }

        footer{
            background:black;
            text-align:center;
            padding:15px;
            margin-top:30px;
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">AnimeX</div>
        <ul>
            <li>Home</li>
            <li>Trending</li>
            <li>Movies</li>
            <li>Series</li>
        </ul>
    </nav>

    <section class="hero">
        <div class="hero-content">
            <h1>Watch Your Favorite Anime</h1>
            <p>Stream Unlimited Anime Anytime Anywhere</p>
            <button onclick="watchNow()">
                Watch Now
            </button>
        </div>
    </section>

    <div class="container">
        <h2>Popular Anime</h2>
        
        <div class="cards">
            <div class="card">
                <img src="naruto img.jfif">
                <div class="card-content">
                    <h3>Naruto</h3>
                    <p>Action • Adventure</p>
                    <button>Play</button>
                </div>
            </div>

            <div class="card">
                <img src="one piece img.jfif">
                <div class="card-content">
                    <h3>One Piece</h3>
                    <p>Fantasy • Comedy</p>
                    <button>Play</button>
                </div>
            </div>

            <div class="card">
                <img src="demon slayer img.jfif">
                <div class="card-content">
                    <h3>Demon Slayer</h3>
                    <p>Dark Fantasy • Action</p>
                    <button>Play</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2026 AnimeX Streaming Website</p>
    </footer>

    <script>
        function watchNow(){
            alert("Welcome to AnimeX!");
        }
    </script>
</body>
</html>
