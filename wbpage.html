<!DOCTYPE html>
<html>
<head>
    <title>Dark Theme Webpage</title>

    <style>
        body{
            margin:0;
            font-family:'Times New Roman';
            background:linear-gradient(135deg,black,darkslateblue,midnightblue);
            color:white;
        }

        h1{
            text-align:center;
            padding-top:30px;
            color:#00f7ff;
            font-size:40px;
        }

        .card{
            background:rgb(30,30,47);
            padding:40px;
            width:320px;
            text-align:center;
            border-radius:20px;
            box-shadow:0 0 20px rgba(0,0,0,0.5);
            margin:60px auto;
        }

        h2{
            color:deeppink;
        }

        p{
            color:lightgray;
        }

        button{
            margin-top:15px;
            padding:10px 22px;
            border:none;
            border-radius:25px;
            background:#00f7ff;
            color:black;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:deeppink;
            color:white;
        }
    </style>
</head>

<body>

    <h1>My Webpage</h1>

    <div class="card">
        <h2>Dark UI</h2>
        <p>Beautiful dark theme webpage using HTML and CSS.</p>
        <button>Get Started</button>
    </div>

</body>
</html>
