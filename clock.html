<!DOCTYPE html>
<html>
<head>
    <title>Clock</title>
    <style>
        body{
            font-family:'Times New Roman';
            background:#222;
            color:white;
            display:flex;
            justify-content:center;
            height:100vh;
            
        }

        .box{text-align:center;}

        #clock{
            font-size:40px;
            background:black;
            padding:20px;
            border-radius:10px;
        }
    </style>
    <script>
    function show(){
        let d=new Date();
        let t=d.getHours()+":"+d.getMinutes()+":"+d.getSeconds();
        document.getElementById("clock").innerHTML=t;
    }
    setInterval(show,1000);
    </script>
</head>
<body onload="show()">
    <div class="box">
        <h1>Digital Clock</h1>
        <div id="clock"></div>
    </div>
</body>
</html>
