<!DOCTYPE html>
<html lang="en">
<head>
    <title>Font Awesome Example</title>

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        body{
            font-family: Arial, sans-serif;
            background:linear-gradient(to right,darkviolet,rgb(194, 18, 194));
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card{
            background: linear-gradient(to right, #ff22cf, #ff0062);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        .icons i{
            font-size: 40px;
            margin: 15px;
            color: #350f77;
            transition: 0.3s;
        }

        .icons i:hover{
            color: red;
            transform: scale(1.2);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Font Awesome Icons</h1>

        <div class="icons">
            <i class="fa-solid fa-house"></i>
            <i class="fa-solid fa-heart"></i>
            <i class="fa-solid fa-user"></i>
            <i class="fa-brands fa-instagram"></i>
            <i class="fa-brands fa-whatsapp"></i>
        </div>
    </div>
</body>
</html>
